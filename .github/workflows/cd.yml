name: Task Manager CD Pipeline

on:
  workflow_run:
     workflows: ["Flask CI Pipeline"]
     types:
        - completed

jobs:
 deploy:
     if: ${{ github.event.workflow_run.conclusion == 'success'}}

     runs-on: ubuntu-latest

     steps:
        - name: Checkout
          uses: actions/checkout@v3

        - name: Deploy to EC2 through ssh
          uses: appleboy/ssh-action@v0.1.7
          with:  
             host: ${{ secrets.EC2_HOST }}  
             username: ${{ secrets.EC2_USER }}
             key: ${{ secrets.EC2_SSH_KEY }}
             port: 22
             scripts: |
                 echo "pulling latest docker image "
                 docker pull sanketkadam09/task-backend:latest
                 docker pull sanketkadam09/task-frontend:latest
                 echo "restart container"
                 docker-compose -f /home/ubuntu/taskmanager/docker-compose.yml down
                 docker-compose -f /home/ubuntu/taskmanager/docker-compose.yml up -d
                 echo "deployment completed"


      