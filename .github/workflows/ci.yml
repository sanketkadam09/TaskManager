name: Flask CI Pipeline

on:
   push:
      branches: [ main ]

jobs:
   test-backend:
      runs-on: ubuntu-latest

      steps:
         - name: Checkout Code
           uses: actions/checkout@v3

         - name: Setup Python 
           uses: actions/setup-python@v4

           with:
              python-version: '3.10'

         - name: Install Backend Dependencies
           run: |
              cd backend
              pip install -r requirements.txt

         - name: Run backend Tests
           run: |
               cd backend
               python -m pytest                  

         # setup node for frontend

         - name: Setup Node 
           uses: actions/setup-node@v3

           with:
              node-version: '18'

        # Install frontend depedencies
         - name: Install Frontend Dependencies
           run: npm install
           working-directory: ./frontend

        # Build fronted
         - name: Build Frontend
           run: npm run build
           working-directory: ./frontend
