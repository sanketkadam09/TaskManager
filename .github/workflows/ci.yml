name: Flask CI Pipeline

on:
   push:
      branches: [ main ]

jobs:
   test-backend:
      runs-on: ubuntu-latest

      steps:
         - name: Checkout Code
           uses: actions/Checkout@v3

         - name: Setup Python 
           uses: actions/Setup-Python@v4

           with:
              python-verion: '3.10'

         - name: Install Dependencies
           run: |
              cd backend
              pip install -r requirements.text
         - name: Run Tests
           run: |
               cd backend
               pytest                  