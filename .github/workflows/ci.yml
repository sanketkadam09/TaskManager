name: Flask CI Pipeline

on:
   push:
      branches: [ main ]

jobs:
   test-backend:
      runs-on: ubuntu-latest

      services:
         postgres:
            image: postgres:15

            env:
              POSTGRES_USER: postgres
              POSTGRES_PASSWORD: postgres
              POSTGRES_DB: taskdb

            ports:
              - 5432:5432
            options: >-
              --health-cmd="pg_isready -U postgres -d taskdb"
              --health-interval=10s
              --health-timeout=5s
              --health-retries=5    

      steps:
         - name: Checkout Code
           uses: actions/checkout@v3

         - name: Setup Python 
           uses: actions/setup-python@v4

           with:
              python-version: '3.10'

         - name: Install Backend Dependencies
           run: |
              cd backend
              pip install -r requirements.txt

         - name: Run backend Tests
           run: |
               cd backend
               python -m pytest                  

         # setup node for frontend

         - name: Setup Node 
           uses: actions/setup-node@v3
           with:
              node-version: '22'

        # Install frontend depedencies
         - name: Install Frontend Dependencies
           run: npm install
           working-directory: ./frontend

        # Build frontend
         - name: Build Frontend
           run: npm run build
           working-directory: ./frontend

        #  login to docker hub
         - name: Login to Docker hub
           uses: docker/login-action@v2

           with:
              username: ${{ secrets.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}
         
         #  setup Docker 
         - name: Set up Docker Buildx
           uses: docker/setup-buildx-action@v3

         # Build backend docker image
          
         - name: Build backend docker image
           run: docker build -t sanketkadam09/task-backend:latest ./backend

         - name: Push backend docker image
           run: docker push sanketkadam09/task-backend:latest  

         - name: Build frontend docker image
           run: docker build -t sanketkadam09/task-frontend:latest ./frontend

         - name: Push frontend docker image
           run: docker push sanketkadam09/task-frontend:latest

