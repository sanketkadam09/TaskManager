name: Flask CI Pipeline

on:
   push:
      branches: [ main ]

jobs:
   test-backend:
      runs-on: ubuntu-latest

      steps:
         - name: Checkout Code
           uses: actions/checkout@v3

         - name: Setup Python 
           uses: actions/setup-python@v4

           with:
              python-version: '3.10'

         - name: Install Dependencies
           run: |
              cd backend
              pip install -r requirements.txt
         - name: Run Tests
           run: |
               cd backend
               python -m pytest                  