version: "3.9"

services:
    db:
       image: postgres:15
       container_name: task-db
       environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: taskdb
       ports:
        - "5432:5432"

       environment:
          DATABASE_URL:postgresql://postgres:postgres@db:5432/taskdb 
       volumes:
          - postgres_data:/var/lib/postgresql/data 

    backend:
     build:
       context: ./backend
     ports:
       - "5000:5000"
     depends_on:
       - db  
     restart: always  

     container_name: task-backend

    frontend:
      build: 
         context: ./frontend
      ports:
        - "5173:5173"
      depends_on:
        - backend
      container_name: task-frontend    

volumes:
   postgres_data: